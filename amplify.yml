version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run typecheck
        - npm run build
  artifacts:
    # Vite outputs the production bundle here.
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
customHeaders:
  # Long-cache immutable, fingerprinted Vite assets. index.html stays
  # short-cached so new deploys are picked up on next load.
  - pattern: '/assets/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=0, must-revalidate'
