name: ai-coordinator

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # `npm install` (not `npm ci`) to tolerate platform-specific
      # optional deps that npm 10/11's strict-lockfile mode flags as
      # missing when the lockfile was generated on a different platform.
      # Trade strict-reproducibility for the workflow staying green —
      # the lockfile is still committed, just not enforced byte-for-byte.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run test
