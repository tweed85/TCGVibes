  the row structure parseStandingsRows reads against: rank, player link
  (with internal labs PID), country flag (title="CC"), record string
  (W-L-T), deck-archetype link with slug, and per-player decklist link.

  Cases covered:
    Row 1 — fully populated (rank, name, country, record, deck slug,
            decklist URL) — happy path
    Row 2 — same shape, different country + multi-segment slug
    Row 3 — row without a deck slug (early drop with no decklist
            submitted) — exercises the null-archetypeSlug branch
    Row 4 — non-ASCII name (Łukasz with stroked L) + 3-segment slug
            (raging-bolt-ogerpon) — exercises slug normalization
    Row 5 — header row (no rank cell with a number) — should be skipped
-->
